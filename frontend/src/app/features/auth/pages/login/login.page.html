<section class="login-shell">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-brand-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <path d="M8 2v4M16 2v4M3 10h18"/>
        </svg>
      </div>
      <span class="login-brand-name">Boardroom Booking</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in with your work email to continue.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Email address</span>
        <input type="email" formControlName="email" autocomplete="email" placeholder="you@company.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="error">Enter a valid email address.</small>
        }
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" placeholder="••••••••" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small class="error">Password must be at least 6 characters.</small>
        }
      </label>

      @if (errorMessage(); as err) {
        <div class="error-banner" role="alert">{{ err }}</div>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>

      <p class="forgot-link">
        <button type="button" class="forgot-btn" (click)="showForgotHint.set(!showForgotHint())">
          Forgot your password?
        </button>
      </p>

      @if (showForgotHint()) {
        <div class="forgot-hint" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          This is an internal system. Password resets must be requested through your system administrator.
        </div>
      }
    </form>
  </div>
</section>
